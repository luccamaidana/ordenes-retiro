<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <title>Operaciones Logísticas - Carga de Retiros</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 40px;
      background-color: #f4f6f9;
      color: #333;
    }

    .container {
      max-width: 600px;
      background: white;
      padding: 30px;
      border-radius: 8px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    }

    h2 {
      border-bottom: 2px solid #0056b3;
      padding-bottom: 10px;
      color: #0056b3;
    }

    .form-group {
      margin-bottom: 15px;
    }

    label {
      display: block;
      margin-bottom: 5px;
      font-weight: bold;
    }

    input[type="text"],
    input[type="number"],
    textarea {
      width: 100%;
      padding: 8px;
      box-sizing: border-box;
      border: 1px solid #ccc;
      border-radius: 4px;
    }

    button {
      background-color: #0056b3;
      color: white;
      padding: 10px 15px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 16px;
    }

    button:hover {
      background-color: #004085;
    }

    .alert-error {
      background-color: #f8d7da;
      color: #721c24;
      padding: 12px;
      border-radius: 4px;
      margin-bottom: 20px;
      border: 1px solid #f5c6cb;
    }

    .alert-exito {
      background-color: #d4edda;
      color: #155724;
      padding: 12px;
      border-radius: 4px;
      margin-bottom: 20px;
      border: 1px solid #c3e6cb;
    }

    .req {
      color: red;
    }
  </style>
</head>

<body>

  <div class="container">
    <h2>Coordinación de Retiros Diarios</h2>

    {% if error %}
    <div class="alert-error">{{ error }}</div>
    {% endif %}

    {% if exito %}
    <div class="alert-exito">{{ exito }}</div>
    {% endif %}

    <form method="POST" action="{% url 'crear_orden_pedido' %}">
      {% csrf_token %} <div class="form-group">
        <label for="id_solicitante">ID Solicitante (Empresa/Cliente) <span class="req">*</span></label>
        <input type="text" id="id_solicitante" name="id_solicitante" value="{{ datos.id_solicitante }}">
      </div>

      <div class="form-group">
        <label for="tipo_servicio">Tipo de Servicio <span class="req">*</span></label>
        <input type="text" id="tipo_servicio" name="tipo_servicio" placeholder="Ej: Retiro Express, Estándar"
          value="{{ datos.tipo_servicio }}">
      </div>

      <div class="form-group">
        <label for="cantidad_bulto">Cantidad de Bultos <span class="req">*</span></label>
        <input type="number" id="cantidad_bulto" name="cantidad_bulto" value="{{ datos.cantidad_bulto }}">
      </div>

      <div class="form-group">
        <label for="observacion">Observaciones Libres</label>
        <textarea id="observacion" name="observacion" rows="4">{{ datos.observacion }}</textarea>
      </div>

      <button type="submit">Registrar Orden de Retiro</button>
    </form>
  </div>

</body>

</html>
